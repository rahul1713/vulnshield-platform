name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint shared library
        run: ruff check shared/python/

      - name: Lint agents
        run: |
          ruff check agents/linux/ --ignore E501
          ruff check agents/windows/ --ignore E501

      - name: Lint services
        run: |
          for dir in services/*/; do
            if [ -d "${dir}app" ]; then
              ruff check "${dir}app" --ignore E501 || true
            fi
          done

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vulnshield
          POSTGRES_USER: vulnshield
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install shared library
        run: pip install -e "shared/python/[dev]"

      - name: Install agent dependencies
        run: pip install -r agents/linux/requirements.txt

      - name: Test agent collectors
        run: |
          cd agents/linux
          python -c "from collectors import collect_all; print('Collectors OK')"

      - name: Run service tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: vulnshield
          POSTGRES_USER: vulnshield
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-key-min-32-chars-long
        run: |
          for dir in services/*/; do
            if [ -d "${dir}tests" ] && [ -f "${dir}requirements.txt" ]; then
              pip install -r "${dir}requirements.txt" 2>/dev/null || true
              pytest "${dir}tests" -v --tb=short 2>/dev/null || echo "No tests in ${dir}"
            fi
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-python, test-python]
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - asset-service
          - scanner-service
          - frontend
          - linux-agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'linux-agent' && 'agents/linux' || matrix.service == 'frontend' && 'frontend' || matrix.service == 'api-gateway' && 'services/api-gateway' || '.' }}
          file: ${{ matrix.service == 'linux-agent' && 'agents/linux/Dockerfile' || matrix.service == 'frontend' && 'frontend/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          push: false
          tags: vulnshield/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate manifest syntax
        run: |
          pip install pyyaml
          python3 <<'PY'
          import glob
          import yaml

          for path in sorted(glob.glob("k8s/*.yaml")):
              with open(path, encoding="utf-8") as fh:
                  list(yaml.safe_load_all(fh))
              print(f"OK {path}")
          PY

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
