name: Docker Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: true
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vulnshield

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - service: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - service: asset-service
            context: .
            dockerfile: services/asset-service/Dockerfile
          - service: scanner-service
            context: .
            dockerfile: services/scanner-service/Dockerfile
          - service: web-scanner-service
            context: .
            dockerfile: services/web-scanner-service/Dockerfile
          - service: ai-code-review
            context: .
            dockerfile: services/ai-code-review/Dockerfile
          - service: ai-redteam
            context: .
            dockerfile: services/ai-redteam/Dockerfile
          - service: patch-intelligence
            context: .
            dockerfile: services/patch-intelligence/Dockerfile
          - service: risk-engine
            context: .
            dockerfile: services/risk-engine/Dockerfile
          - service: reporting-service
            context: .
            dockerfile: services/reporting-service/Dockerfile
          - service: compliance-service
            context: .
            dockerfile: services/compliance-service/Dockerfile
          - service: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - service: linux-agent
            context: agents/linux
            dockerfile: agents/linux/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
        continue-on-error: true

  publish-summary:
    name: Publish Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Registry: ghcr.io/${{ github.repository_owner }}/vulnshield-*" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.ref_name || inputs.tag || 'latest' }}" >> $GITHUB_STEP_SUMMARY
