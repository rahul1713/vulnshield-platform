# Sandbox deployment overrides — no data leakage, no exposed infrastructure ports.
# Usage:
#   ./scripts/generate-sandbox-env.sh .env.sandbox
#   make sandbox-up

x-sandbox-env: &sandbox-env
  ENVIRONMENT: sandbox
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required for sandbox}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required for sandbox}
  INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-admin}
  INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL:-admin@vulnshield.local}
  INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:?INIT_ADMIN_PASSWORD is required for sandbox}
  SCAN_SANDBOX_MODE: "true"
  ALLOW_SIMULATED_SCANS: "false"
  ALLOW_EXTERNAL_TARGETS: "false"
  SANDBOX_ALLOW_PRIVATE: ${SANDBOX_ALLOW_PRIVATE:-false}
  AI_SECURITY_LOCAL_ONLY: "true"

services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  rabbitmq:
    ports: !reset []

  minio:
    ports: !reset []

  ollama:
    ports: !reset []
    networks:
      - vulnshield-net

  zap:
    ports: !reset []
    profiles:
      - scan

  scan-worker:
    environment:
      <<: *sandbox-env
      SCAN_SANDBOX_MODE: "true"
      ALLOW_EXTERNAL_TARGETS: "false"
      ZAP_BASE_URL: http://zap:8080
    profiles:
      - scan

  ollama-init:
    profiles:
      - ai

  api-gateway:
    environment:
      <<: *sandbox-env
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "127.0.0.1:18080:8080"

  auth-service:
    environment:
      <<: *sandbox-env
      JWT_SECRET: ${JWT_SECRET}

  asset-service:
    environment:
      <<: *sandbox-env

  scanner-service:
    environment:
      <<: *sandbox-env

  web-scanner-service:
    environment:
      <<: *sandbox-env

  ai-code-review:
    environment:
      <<: *sandbox-env

  ai-redteam:
    environment:
      <<: *sandbox-env

  patch-intelligence:
    environment:
      <<: *sandbox-env

  risk-engine:
    environment:
      <<: *sandbox-env

  reporting-service:
    environment:
      <<: *sandbox-env

  compliance-service:
    environment:
      <<: *sandbox-env

  notification-service:
    environment:
      <<: *sandbox-env

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
        NEXT_PUBLIC_DEPLOY_ENV: sandbox
        NEXT_PUBLIC_ENABLE_DEMO_MODE: "false"
    environment:
      NEXT_PUBLIC_DEPLOY_ENV: sandbox
      NEXT_PUBLIC_ENABLE_DEMO_MODE: "false"
    ports:
      - "127.0.0.1:3000:3000"
