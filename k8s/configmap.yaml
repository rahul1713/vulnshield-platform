apiVersion: v1
kind: ConfigMap
metadata:
  name: vulnshield-config
  namespace: vulnshield
data:
  ENVIRONMENT: "sandbox"
  LOG_LEVEL: "INFO"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "vulnshield"
  POSTGRES_USER: "vulnshield"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "vulnshield"
  RABBITMQ_VHOST: "vulnshield"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "vulnshield-evidence"
  MINIO_USE_SSL: "false"
  LLM_PROVIDER: "ollama"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_MODEL: "qwen3.6"
  AI_SECURITY_LOCAL_ONLY: "true"
  AI_SECURITY_ALLOWED_MODELS: "qwen3.6"
  # Browser-facing API URL — MUST be your public ingress hostname, not cluster DNS
  CORS_ORIGINS: "https://vulnshield-sandbox.example.com"
  NEXT_PUBLIC_API_URL: "https://vulnshield-sandbox.example.com/api/v1"
  NEXT_PUBLIC_DEPLOY_ENV: "sandbox"
  NEXT_PUBLIC_ENABLE_DEMO_MODE: "false"
