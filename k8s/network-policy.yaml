apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vulnshield-default-deny-ingress
  namespace: vulnshield
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vulnshield-api-gateway-ingress
  namespace: vulnshield
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vulnshield-internal-services
  namespace: vulnshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: vulnshield
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: vulnshield
