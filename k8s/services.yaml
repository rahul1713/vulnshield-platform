---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: vulnshield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      containers:
        - name: risk-engine
          image: ghcr.io/vulnshield/vulnshield-risk-engine:latest
          ports:
            - containerPort: 8008
          envFrom:
            - configMapRef:
                name: vulnshield-config
            - secretRef:
                name: vulnshield-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: vulnshield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
