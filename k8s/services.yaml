---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-service
  namespace: vulnshield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scanner-service
  template:
    metadata:
      labels:
        app: scanner-service
    spec:
      containers:
        - name: scanner-service
          image: ghcr.io/vulnshield/vulnshield-scanner-service:latest
