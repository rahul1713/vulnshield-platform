worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    upstream auth_service { server auth-service:8001; }
    upstream asset_service { server asset-service:8002; }
    upstream scanner_service { server scanner-service:8003; }
    upstream web_scanner_service { server web-scanner-service:8004; }
    upstream ai_code_review { server ai-code-review:8005; }
    upstream ai_redteam { server ai-redteam:8006; }
    upstream patch_intelligence { server patch-intelligence:8007; }
    upstream risk_engine { server risk-engine:8008; }
    upstream reporting_service { server reporting-service:8009; }
    upstream compliance_service { server compliance-service:8010; }
    upstream notification_service { server notification-service:8011; }

    server {
        listen 8080;
        server_name _;

        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"VulnShield API Gateway","port":8080}';
            add_header Content-Type application/json;
        }

        location = /auth {
            internal;
            proxy_pass http://auth_service/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        # Public auth endpoints
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/users {
            auth_request /auth;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/roles {
            auth_request /auth;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/audit-logs {
            auth_request /auth;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/assets {
            auth_request /auth;
            proxy_pass http://asset_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/scans {
            auth_request /auth;
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # Endpoint agents authenticate with scoped machine tokens (not user JWT).
        location /api/v1/agents/machine {
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Agent-Token $http_x_agent_token;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Client-Cert-Fingerprint $http_x_client_cert_fingerprint;
            proxy_set_header X-SSL-Client-Fingerprint $http_x_ssl_client_fingerprint;
        }

        location = /api/v1/ingestion/agent {
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header X-Agent-Token $http_x_agent_token;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Client-Cert-Fingerprint $http_x_client_cert_fingerprint;
            proxy_set_header X-SSL-Client-Fingerprint $http_x_ssl_client_fingerprint;
        }

        location /api/v1/agents {
            auth_request /auth;
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/ingestion {
            auth_request /auth;
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/vulnerabilities {
            auth_request /auth;
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/dashboard {
            auth_request /auth;
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/search {
            auth_request /auth;
            proxy_pass http://scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/web-scanner {
            auth_request /auth;
            rewrite ^/api/v1/web-scanner(.*)$ /api/v1/web-scans$1 break;
            proxy_pass http://web_scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/web-scans {
            auth_request /auth;
            proxy_pass http://web_scanner_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/code-review {
            auth_request /auth;
            rewrite ^/api/v1/code-review(.*)$ /api/v1/reviews$1 break;
            proxy_pass http://ai_code_review;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/reviews {
            auth_request /auth;
            proxy_pass http://ai_code_review;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/red-team {
            auth_request /auth;
            rewrite ^/api/v1/red-team(.*)$ /api/v1/campaigns$1 break;
            proxy_pass http://ai_redteam;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/campaigns {
            auth_request /auth;
            proxy_pass http://ai_redteam;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/patch-intelligence {
            auth_request /auth;
            rewrite ^/api/v1/patch-intelligence(.*)$ /api/v1/patches$1 break;
            proxy_pass http://patch_intelligence;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/patches {
            auth_request /auth;
            proxy_pass http://patch_intelligence;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/risk {
            auth_request /auth;
            proxy_pass http://risk_engine;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/reports {
            auth_request /auth;
            proxy_pass http://reporting_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/compliance {
            auth_request /auth;
            proxy_pass http://compliance_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/notifications {
            auth_request /auth;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
