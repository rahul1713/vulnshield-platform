worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Docker embedded DNS — resolve upstream hostnames at request time so nginx
    # can start even when optional backend containers are not yet running.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Browser UI (e.g. :3002) calls API gateway (:18080) cross-origin with Authorization.
    # OPTIONS preflight must succeed before auth_request runs on the actual request.
    map $http_origin $cors_allow_origin {
        default "";
        "http://localhost:3002" $http_origin;
        "http://127.0.0.1:3002" $http_origin;
        "http://localhost:3000" $http_origin;
        "http://127.0.0.1:3000" $http_origin;
    }

    server {
        listen 8080;
        server_name _;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        set $auth_upstream auth-service:8001;
        set $asset_upstream asset-service:8002;
        set $scanner_upstream scanner-service:8003;
        set $web_scanner_upstream web-scanner-service:8004;
        set $ai_code_review_upstream ai-code-review:8005;
        set $ai_redteam_upstream ai-redteam:8006;
        set $patch_intelligence_upstream patch-intelligence:8007;
        set $risk_engine_upstream risk-engine:8008;
        set $reporting_upstream reporting-service:8009;
        set $compliance_upstream compliance-service:8010;
        set $notification_upstream notification-service:8011;

        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"VulnShield API Gateway","port":8080}';
            add_header Content-Type application/json;
        }

        location = /auth {
            internal;
            proxy_pass http://$auth_upstream/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        # Public auth endpoints
        location /api/v1/auth/ {
            proxy_pass http://$auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/users {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/roles {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/audit-logs {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/assets {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$asset_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/scans {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        # Endpoint agents authenticate with scoped machine tokens (not user JWT).
        location /api/v1/agents/machine {
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Agent-Token $http_x_agent_token;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Client-Cert-Fingerprint $http_x_client_cert_fingerprint;
            proxy_set_header X-SSL-Client-Fingerprint $http_x_ssl_client_fingerprint;
        }

        location = /api/v1/ingestion/agent {
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Agent-Token $http_x_agent_token;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Client-Cert-Fingerprint $http_x_client_cert_fingerprint;
            proxy_set_header X-SSL-Client-Fingerprint $http_x_ssl_client_fingerprint;
        }

        location /api/v1/agents {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/ingestion {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/vulnerabilities {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/dashboard {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/search {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/web-scanner {
            include cors-preflight.inc;
            auth_request /auth;
            rewrite ^/api/v1/web-scanner(.*)$ /api/v1/web-scans$1 break;
            proxy_pass http://$web_scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/web-scans {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$web_scanner_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/code-review {
            include cors-preflight.inc;
            auth_request /auth;
            rewrite ^/api/v1/code-review(.*)$ /api/v1/reviews$1 break;
            proxy_pass http://$ai_code_review_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/reviews {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$ai_code_review_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/red-team {
            include cors-preflight.inc;
            auth_request /auth;
            rewrite ^/api/v1/red-team(.*)$ /api/v1/campaigns$1 break;
            proxy_pass http://$ai_redteam_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/campaigns {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$ai_redteam_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/patch-intelligence {
            include cors-preflight.inc;
            auth_request /auth;
            rewrite ^/api/v1/patch-intelligence(.*)$ /api/v1/patches$1 break;
            proxy_pass http://$patch_intelligence_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/patches {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$patch_intelligence_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/risk {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$risk_engine_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/reports {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$reporting_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/compliance {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$compliance_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/notifications {
            include cors-preflight.inc;
            auth_request /auth;
            proxy_pass http://$notification_upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
